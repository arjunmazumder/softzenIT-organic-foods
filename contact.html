<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Contact Us - Organic Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .contact-header {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 80px 0;
            text-align: center;
        }

        .contact-box {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: #28a745;
            border-radius: 30px;
            padding: 10px 25px;
        }

        .btn-custom:hover {
            background: #218838;
        }

        .info-box {
            background: #ffffff;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .info-box i {
            font-size: 30px;
            color: #28a745;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <a class="navbar-brand fw-bold text-success" href="#">Organic Shop</a>
</nav>

<!-- Header -->
<div class="contact-header">
    <h1 class="fw-bold">Contact Us</h1>
    <p>We’d love to hear from you 😊</p>
</div>

<!-- Contact Section -->
<div class="container py-5">

    <div class="row g-4">

        <!-- Contact Info -->
        <div class="col-md-4">
            <div class="info-box">
                <i class="fas fa-map-marker-alt"></i>
                <h5>Address</h5>
                <p>Dhaka, Banani</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="info-box">
                <i class="fas fa-phone"></i>
                <h5>Phone</h5>
                <p>+880 1234 567 890</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="info-box">
                <i class="fas fa-envelope"></i>
                <h5>Email</h5>
                <p>support@organicshop.com</p>
            </div>
        </div>

    </div>

    <!-- Form -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="contact-box">

                <h3 class="mb-4 text-center">Send Message</h3>

                <form>
                    <div class="row g-3">

                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Your Name" required>
                        </div>

                        <div class="col-md-6">
                            <input type="email" class="form-control" placeholder="Your Email" required>
                        </div>

                        <div class="col-12">
                            <input type="text" class="form-control" placeholder="Subject">
                        </div>

                        <div class="col-12">
                            <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                        </div>

                        <div class="col-12 text-center">
                            <button class="btn btn-custom text-white">
                                <i class="fas fa-paper-plane me-2"></i>Send Message
                            </button>
                        </div>

                    </div>
                </form>

            </div>
        </div>
    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-4">
    <p class="mb-0">&copy; 2026 Organic Shop | All Rights Reserved</p>
</footer>

</body>
</html>
