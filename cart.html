<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | saleZen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .cart-container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .product-img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .btn-primary { background-color: #3cb815; border: none; }
        .btn-primary:hover { background-color: #2e8b0f; }
        .remove-btn { color: #dc3545; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .remove-btn:hover { color: #a71d2a; transform: scale(1.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3 mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-success" href="index.html">saleZen</a>
        <div class="ms-auto">
            <a href="index.html" class="btn btn-outline-success rounded-pill px-4">Continue Shopping</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <h2 class="fw-bold mb-4">Your Shopping Cart</h2>
    
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="cart-container">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr class="text-muted">
                                <th>Product</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cart-items-body">
                            </tbody>
                    </table>
                </div>
                <div id="empty-cart-msg" class="text-center py-5 d-none">
                    <i class="bi bi-cart-x display-1 text-muted"></i>
                    <p class="mt-3 fs-5 text-muted">Your cart is empty!</p>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="cart-container">
                <h4 class="fw-bold mb-4">Order Summary</h4>
                <div class="d-flex justify-content-between mb-2">
                    <span>Total Items:</span>
                    <span id="total-qty" class="fw-bold">0</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4">
                    <span class="fs-5">Total Cost:</span>
                    <span class="fs-5 fw-bold text-success">BDT <span id="total-cost">0.00</span></span>
                </div>
                <button class="btn btn-primary btn-lg w-100 rounded-pill py-3" onclick="checkout()">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        displaySelectedProducts();
    }

    function displaySelectedProducts() {
        let cart = JSON.parse(localStorage.getItem('saleZenCart')) || [];
        const tbody = document.getElementById('cart-items-body');
        const emptyMsg = document.getElementById('empty-cart-msg');
        let totalCost = 0;

        if (cart.length === 0) {
            tbody.innerHTML = "";
            emptyMsg.classList.remove('d-none');
            document.getElementById('total-qty').innerText = "0";
            document.getElementById('total-cost').innerText = "0.00";
        } else {
            emptyMsg.classList.add('d-none');
            tbody.innerHTML = ""; // আগের লিস্ট ক্লিয়ার করা

            // লুপ চালিয়ে শুধু সিলেক্ট করা পণ্যগুলো দেখানো
            cart.forEach((item, index) => {
                totalCost += item.price;
                let row = `
                    <tr>
                        <td><img src="${item.img}" class="product-img" style="width:50px; border-radius:5px;"></td>
                        <td>${item.name}</td>
                        <td class="fw-bold text-success">BDT ${item.price.toFixed(2)}</td>
                        <td class="text-center">
                            <i class="bi bi-trash3 text-danger" style="cursor:pointer" onclick="removeItem(${index})"></i>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });

            document.getElementById('total-qty').innerText = cart.length;
            document.getElementById('total-cost').innerText = totalCost.toFixed(2);
        }
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('saleZenCart')) || [];
        cart.splice(index, 1); // ওই নির্দিষ্ট আইটেমটি বাদ দেওয়া
        localStorage.setItem('saleZenCart', JSON.stringify(cart));
        displaySelectedProducts(); // পেজ আপডেট করা
    }
</script>
</body>
</html>
