<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | saleZen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #3cb815; /* saleZen Green */
            --dark-color: #1a1a1a;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--dark-color);
        }

        .product-container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .img-display-area {
            background: #f1f1f1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            min-height: 450px;
        }

        #product-img {
            max-width: 100%;
            height: auto;
            transform: scale(1);
            transition: transform 0.5s ease;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1));
        }

        #product-img:hover {
            transform: scale(1.05);
        }

        .product-content {
            padding: 60px 40px;
        }

        .badge-organic {
            background: rgba(60, 184, 21, 0.1);
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding: 8px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .price-wrapper h2 {
            color: var(--primary-color);
            font-weight: 800;
            font-size: 2.5rem;
        }

        /* Quantity Controls */
        .qty-box {
            display: flex;
            align-items: center;
            background: #f1f1f1;
            border-radius: 15px;
            padding: 5px;
            width: fit-content;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: white;
            border-radius: 12px;
            font-weight: bold;
            color: var(--dark-color);
            transition: 0.3s;
        }

        .qty-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        .qty-input {
            width: 60px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .btn-add-cart {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-add-cart:hover {
            background: var(--dark-color);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container py-5 mt-5">

    <a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary rounded-pill px-3 mb-4">
        <i class="bi bi-arrow-left me-2"></i>Back to Shop
    </a>

       <div style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
    <a href="cart.html" class="nav-item nav-link position-relative p-0">
        <i class="bi bi-cart4 fs-4"></i>
        
        <span id="cart-count" 
              class="position-absolute badge rounded-pill bg-danger" 
              style="font-size: 0.6rem; top: -5px; right: -10px; padding: 3px 6px;">
            0
        </span>
    </a>
</div>
    

    <div class="row product-container shadow-sm">
        <div class="col-lg-6 p-0">
            <div class="img-display-area">
                <img id="product-img" src="" alt="Product Image">
            </div>
        </div>
        
        <div class="col-lg-6">
            <div class="product-content">
                <span class="badge-organic">Premium Quality</span>
                <h1 id="product-name" class="display-5 fw-800 mb-3">Product Name</h1>
                
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="text-warning small">
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-half"></i>
                    </div>
                    <span class="text-muted small fw-bold">(120+ Positive Reviews)</span>
                </div>

                <div class="price-wrapper mb-4">
                    <h2 id="display-total-price">BDT 0.00</h2>
                    <span id="product-oldprice" class="text-muted text-decoration-line-through"></span>
                </div>

                <p class="text-muted mb-5">
                    Experience the taste of nature with our fresh, chemical-free organic products. 
                    Directly sourced from trusted local farms to your doorstep.
                </p>

                <div class="d-flex flex-wrap align-items-center gap-4">
                    <div>
                        <label class="d-block small fw-bold mb-2">Quantity</label>
                        <div class="qty-box">
                            <button class="qty-btn" onclick="changeQty(-1)"><i class="bi bi-dash-lg"></i></button>
                            <input type="text" id="qty-input" class="qty-input" value="1" readonly>
                            <button class="qty-btn" onclick="changeQty(1)"><i class="bi bi-plus-lg"></i></button>
                        </div>
                    </div>
                    
                    <div class="mt-4 mt-sm-0 flex-grow-1">
                        <label class="d-none d-sm-block mb-2">&nbsp;</label>
                        <button class="btn-add-cart w-100 shadow-sm">
                            <i class="bi bi-cart-plus me-2"></i> Add to Cart
                        </button>
                    </div>
                </div>

                <div class="mt-5 pt-4 border-top">
                    <div class="row g-3">
                        <div class="col-6"><small class="text-muted"><i class="bi bi-truck me-2 text-success"></i>Fast Delivery</small></div>
                        <div class="col-6"><small class="text-muted"><i class="bi bi-shield-check me-2 text-success"></i>100% Organic</small></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        updateCartCountDisplay(); // পেজ লোড হলে কার্ট সংখ্যা দেখানো
        
        const params = new URLSearchParams(window.location.search);
        window.productName = params.get('name') || "Product";
        const priceStr = params.get('price') || "0";
        window.productImg = params.get('img') || "img/placeholder.jpg";

        window.basePrice = parseFloat(priceStr);
        document.getElementById('product-name').innerText = window.productName;
        document.getElementById('product-img').src = window.productImg;
        updateDisplayPrice(1);
    }

    // কার্ট সংখ্যা মেমোরি থেকে নিয়ে দেখানো (সব পেজে কমন)
    function updateCartCountDisplay() {
        let cart = JSON.parse(localStorage.getItem('saleZenCart')) || [];
        document.getElementById('cart-count').innerText = cart.length;
    }

    function changeQty(amount) {
        const qtyInput = document.getElementById('qty-input');
        let currentQty = parseInt(qtyInput.value) + amount;
        if(currentQty < 1) currentQty = 1;
        qtyInput.value = currentQty;
        updateDisplayPrice(currentQty);
    }

    function updateDisplayPrice(qty) {
        const total = (qty * window.basePrice).toFixed(2);
        document.getElementById('display-total-price').innerText = "BDT " + total;
    }

    // "Add to Cart" বাটনের মডিফাইড লজিক
    document.querySelector('.btn-add-cart').addEventListener('click', function() {
        const qtyToAdd = parseInt(document.getElementById('qty-input').value);
        
        // ১. মেমোরি থেকে বর্তমান কার্ট লিস্ট আনা
        let cart = JSON.parse(localStorage.getItem('saleZenCart')) || [];
        
        // ২. যতগুলো Quantity, ততবার লুপ চালিয়ে পণ্যটি লিস্টে যোগ করা
        for(let i = 0; i < qtyToAdd; i++) {
            cart.push({
                name: window.productName,
                price: window.basePrice,
                img: window.productImg
            });
        }
        
        // ৩. আপডেট করা লিস্টটি মেমোরিতে (localStorage) সেভ করা
        localStorage.setItem('saleZenCart', JSON.stringify(cart));
        
        // ৪. স্ক্রিনে কাউন্টার আপডেট করা
        updateCartCountDisplay();
        
        alert("Success! " + qtyToAdd + " " + window.productName + "(s) added to your cart.");
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
